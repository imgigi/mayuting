<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>插画创作</title>
<style>
body { margin:0; font-family:Arial, Helvetica, sans-serif; background:#111; color:white; line-height:1.6; }
.container { width:90%; max-width:1200px; margin:auto; }
.hero { width:100%; height:60vh; overflow:hidden; display:flex; align-items:center; justify-content:center; background:#1a1a1a; }
.hero h1 { font-size:48px; text-align:center; }
.section { padding:80px 0; }
.section-title { font-size:40px; margin-bottom:20px; }
.grid { display:grid; grid-template-columns:repeat(2,1fr); gap:30px; }
.grid img { width:100%; border-radius:10px; }
.full-img { width:100%; margin:20px 0; border-radius:10px; }
.back { position:fixed; top:30px; left:30px; background:white; color:black; padding:10px 20px; text-decoration:none; border-radius:20px; font-weight:bold; z-index:100; }
.video-container { position:relative; width:100%; padding-bottom:56.25%; margin:40px 0; }
.video-container iframe { position:absolute; top:0; left:0; width:100%; height:100%; border:none; border-radius:10px; }
</style>
</head>
<body>
<a href="index.html" class="back">返回首页</a>
<div class="hero">
<h1>插画创作</h1>
</div>
<div class="container">
<div class="section">
<h2 class="section-title">王哥庄山海礼插画设计</h2>
<img class="full-img" src="https://i.postimg.cc/nzwpPgTM/1-wang-ge-zhuang-shan-hai-li-cha-hua-she-ji.jpg" alt="王哥庄山海礼插画设计">
</div>
<div class="section">
<h2 class="section-title">梦"涧"海底之眼</h2>
<img class="full-img" src="https://i.postimg.cc/ZRqJj4P5/2-meng-jian-hai-di-zhi-yan1.jpg" alt="梦涧海底之眼1">
<img class="full-img" src="https://i.postimg.cc/25Gz4VZF/2-meng-jian-hai-di-zhi-yan2.jpg" alt="梦涧海底之眼2">
<img class="full-img" src="https://i.postimg.cc/nLpFjvCF/2-meng-jian-hai-di-zhi-yan3.jpg" alt="梦涧海底之眼3">
<img class="full-img" src="https://i.postimg.cc/Z5rY5fKb/2-meng-jian-hai-di-zhi-yan4.jpg" alt="梦涧海底之眼4">
</div>
<div class="section">
<h2 class="section-title">九歌·云中君</h2>
<img class="full-img" src="https://i.postimg.cc/kgxMgjMk/3-jiu-ge-yun-zhong-jun.jpg" alt="九歌·云中君">
</div>
</div>
</body>
</html>
